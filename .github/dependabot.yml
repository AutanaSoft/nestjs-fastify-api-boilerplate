version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Caracas'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'status:triage'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      prod-dependencies:
        dependency-type: 'production'
      dev-dependencies:
        dependency-type: 'development'
    ignore:
      - dependency-name: 'typescript'
        versions:
          - '>=6.0.0'
      - dependency-name: 'fastify'
        versions:
          - '>=5.8.3'
      - dependency-name: '@swc/cli'
        versions:
          - '>=0.8.0'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:30'
      timezone: 'America/Caracas'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(actions)'
